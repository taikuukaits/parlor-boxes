#include <ESP8266WiFi.h>
#include <WiFiManager.h>
#include <ArduinoOTA.h>
#include <Wire.h>
#include <Adafruit_GFX.h>
#include <Adafruit_SSD1306.h>
#include <time.h>
#include <ESP8266HTTPClient.h>
#include <WiFiClientSecure.h>

#define MUX_ADDR 0x70

Adafruit_SSD1306 display1(128, 64, &Wire, -1);
Adafruit_SSD1306 display2(128, 64, &Wire, -1);
Adafruit_SSD1306 display3(128, 64, &Wire, -1);

Adafruit_SSD1306 display4(128, 32, &Wire, -1);
Adafruit_SSD1306 display5(128, 32, &Wire, -1);
Adafruit_SSD1306 display6(128, 32, &Wire, -1);

struct DailyData {
  String box1;
  String box1_bottom;
  String box2;
  String box2_bottom;
  String box3;
  String box3_bottom;
  bool valid = false;
};

DailyData dailyData;
String lastFetchedDate = "";
bool puzzleDrawn = false;
unsigned long lastCheck = 0;

String getDateString() {
  time_t now = time(nullptr);
  if (now < 100000) return "";
  struct tm *t = localtime(&now);
  char buf[12];
  snprintf(buf, sizeof(buf), "%04d-%02d-%02d", t->tm_year + 1900, t->tm_mon + 1, t->tm_mday);
  return String(buf);
}

DailyData parseDaily(const String &raw) {
  DailyData data;

  if (raw.length() == 0 || raw.length() > 4096) {
    Serial.println("Parse: empty or oversized payload, skipping");
    return data;
  }

  int start = 0;
  while (start < (int)raw.length()) {
    int end = raw.indexOf('\n', start);
    if (end == -1) end = raw.length();

    String line = raw.substring(start, end);
    line.trim();
    start = end + 1;

    if (line.length() == 0) continue;

    int colon = line.indexOf(':');
    if (colon == -1) continue;

    String key = line.substring(0, colon);
    String value = line.substring(colon + 1);
    key.trim();
    value.trim();

    if (key.length() == 0 || value.length() == 0) continue;
    if (key.length() > 32 || value.length() > 256) continue;

    if (key == "box1_top") {
      data.box1 = value;
    } else if (key == "box1_bottom") {
      data.box1_bottom = (value == "gem" || value == "empty") ? value : "empty";
    } else if (key == "box2_top") {
      data.box2 = value;
    } else if (key == "box2_bottom") {
      data.box2_bottom = (value == "gem" || value == "empty") ? value : "empty";
    } else if (key == "box3_top") {
      data.box3 = value;
    } else if (key == "box3_bottom") {
      data.box3_bottom = (value == "gem" || value == "empty") ? value : "empty";
    }
  }

  if (data.box1.length() > 0 && data.box2.length() > 0 && data.box3.length() > 0) {
    data.valid = true;
  } else {
    Serial.println("Parse: missing one or more required box fields");
  }

  return data;
}

void fetchDailyFile() {
  String date = getDateString();
  if (date == "") {
    Serial.println("Fetch: NTP not ready, skipping");
    return;
  }
  if (date == lastFetchedDate) {
    Serial.println("Fetch: already fetched today (" + date + ")");
    return;
  }

  String url = "https://taikuukaits.github.io/parlor-boxes/daily/" + date + ".txt";
  Serial.println("Fetch: " + url);

  WiFiClientSecure client;
  client.setInsecure();
  client.setTimeout(10);

  HTTPClient http;
  if (!http.begin(client, url)) {
    Serial.println("Fetch: http.begin() failed");
    return;
  }

  http.setTimeout(10000);
  http.addHeader("User-Agent", "ESP8266-ParlorBoxes/1.0");

  int code = http.GET();
  Serial.println("Fetch: HTTP " + String(code));

  if (code == 200) {
    String body = http.getString();
    DailyData parsed = parseDaily(body);
    if (parsed.valid) {
      dailyData = parsed;
      lastFetchedDate = date;
      Serial.println("Fetch: OK");
      Serial.println("  box1=" + dailyData.box1 + " bottom=" + dailyData.box1_bottom);
      Serial.println("  box2=" + dailyData.box2 + " bottom=" + dailyData.box2_bottom);
      Serial.println("  box3=" + dailyData.box3 + " bottom=" + dailyData.box3_bottom);
    } else {
      Serial.println("Fetch: parse failed, keeping old data");
    }
  } else if (code == 404) {
    Serial.println("Fetch: no file for today yet, will retry");
  } else {
    Serial.println("Fetch: unexpected code " + String(code) + ", will retry");
  }

  http.end();
}

void setupTime() {
  configTime(0, 0, "pool.ntp.org", "time.nist.gov");
  Serial.print("Waiting for NTP");
  int attempts = 0;
  while (time(nullptr) < 100000 && attempts < 20) {
    delay(500);
    Serial.print(".");
    attempts++;
  }
  Serial.println(attempts < 20 ? " OK" : " TIMEOUT");
}

void selectChannel(uint8_t channel) {
  Wire.beginTransmission(MUX_ADDR);
  Wire.write(1 << channel);
  Wire.endTransmission();
}


void setup() {
  Serial.begin(115200);

  WiFiManager wm;

  if (!wm.autoConnect("ParlorBoxes-Setup")) {
    Serial.println("Failed to connect, restarting...");
    ESP.restart();
  }
  Serial.println("WiFi connected!");

  ArduinoOTA.setHostname("parlor-boxes");

  ArduinoOTA.onStart([]() { Serial.println("OTA Start"); });
  ArduinoOTA.onEnd([]()   { Serial.println("OTA Done");  });
  ArduinoOTA.onError([](ota_error_t e) { ESP.restart(); });

  ArduinoOTA.begin();
  Serial.println("OTA ready");

  Wire.begin(D2, D1);
  Serial.println("Started wire");

  selectChannel(1);
  if (!display1.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 1 failed");

  selectChannel(2);
  if (!display2.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 2 failed");

  selectChannel(3);
  if (!display3.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 3 failed");

  selectChannel(5);
  if (!display4.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 4 failed");

  selectChannel(6);
  if (!display5.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 5 failed");

  selectChannel(7);
  if (!display6.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 6 failed");

  setupTime();
  fetchDailyFile();
}

void drawDiamond(Adafruit_SSD1306 &display, bool drawDiamond) {
  display.clearDisplay();
  
  if (!drawDiamond) {
    display.display();
    return;
  }
  int w = display.width();   // 128
  int h = display.height();  // 32
  
  int cx = w / 2;            // center x (64)
  int cy = h / 2;            // center y (16)
  int rx = 20;               // horizontal radius
  int ry = 12;               // vertical radius

  // Diamond is just 4 lines connecting top/bottom/left/right points
  int top    = cy + ry;
  int bottom = cy - ry;
  int left   = cx - rx;
  int right  = cx + rx;

  display.drawLine(cx, top,    right, cy,     SSD1306_WHITE); // top to right
  display.drawLine(right, cy,  cx,    bottom, SSD1306_WHITE); // right to bottom
  display.drawLine(cx, bottom, left,  cy,     SSD1306_WHITE); // bottom to left
  display.drawLine(left, cy,   cx,    top,    SSD1306_WHITE); // left to top

  display.display();
}

void drawPuzzle() {
  if (!dailyData.valid) {
    Serial.println("drawPuzzle: no valid data yet, skipping");
    return;
  }

  // --- Box 1 ---
  selectChannel(1);
  display1.clearDisplay();
  display1.setTextSize(1);
  display1.setTextColor(SSD1306_WHITE);
  display1.setCursor(0, 10);
  display1.print(dailyData.box1);
  display1.display();

  selectChannel(5);
  drawDiamond(display4, dailyData.box1_bottom == "gem");

  // --- Box 2 ---
  selectChannel(2);
  display2.clearDisplay();
  display2.setTextSize(1);
  display2.setTextColor(SSD1306_WHITE);
  display2.setCursor(0, 10);
  display2.print(dailyData.box2);
  display2.display();

  selectChannel(6);
  drawDiamond(display5, dailyData.box2_bottom == "gem");

  // --- Box 3 ---
  selectChannel(3);
  display3.clearDisplay();
  display3.setTextSize(1);
  display3.setTextColor(SSD1306_WHITE);
  display3.setCursor(0, 10);
  display3.print(dailyData.box3);
  display3.display();

  selectChannel(7);
  drawDiamond(display6, dailyData.box3_bottom == "gem");
}

void loop() {
  ArduinoOTA.handle();

  if (millis() - lastCheck > 3600000UL || lastCheck == 0) {
    lastCheck = millis();
    String prevDate = lastFetchedDate;
    fetchDailyFile();
    // If we just got new data, mark as needing redraw
    if (lastFetchedDate != prevDate) {
      puzzleDrawn = false;
    }
  }

  // Draw once when we have valid data we haven't drawn yet
  if (dailyData.valid && !puzzleDrawn) {
    drawPuzzle();
    puzzleDrawn = true;
  }
}
