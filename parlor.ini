#include <ESP8266WiFi.h>
#include <WiFiManager.h>
#include <ArduinoOTA.h>
#include <Wire.h>
#include <Adafruit_GFX.h>
#include <Adafruit_SSD1306.h>
#include <time.h>
#include <ESP8266HTTPClient.h>
#include <WiFiClientSecure.h>

// ─────────────────────────────────────────────
//  CONFIGURATION — edit everything here
// ─────────────────────────────────────────────

#define MUX_ADDR 0x70

// Which mux channel is each physical box's top (128×64) and bottom (128×32) display?
#define BLUE_BOX_TOP_CHANNEL     1
#define BLUE_BOX_BOTTOM_CHANNEL  6

#define WHITE_BOX_TOP_CHANNEL    2
#define WHITE_BOX_BOTTOM_CHANNEL 5

#define BLACK_BOX_TOP_CHANNEL    3
#define BLACK_BOX_BOTTOM_CHANNEL 7

// ─────────────────────────────────────────────
//  DISPLAY OBJECTS
// ─────────────────────────────────────────────

Adafruit_SSD1306 blueTop   (128, 64, &Wire, -1);
Adafruit_SSD1306 whiteTop  (128, 64, &Wire, -1);
Adafruit_SSD1306 blackTop  (128, 64, &Wire, -1);

Adafruit_SSD1306 blueBottom (128, 32, &Wire, -1);
Adafruit_SSD1306 whiteBottom(128, 32, &Wire, -1);
Adafruit_SSD1306 blackBottom(128, 32, &Wire, -1);

// ─────────────────────────────────────────────
//  DAILY DATA
// ─────────────────────────────────────────────

struct DailyData {
  String blueTop,  blueBottom;
  String whiteTop, whiteBottom;
  String blackTop, blackBottom;
  bool valid = false;
};

DailyData dailyData;
String lastFetchedDate = "";
bool puzzleDrawn = false;
unsigned long lastCheck = 0;

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────

void selectChannel(uint8_t channel) {
  Wire.beginTransmission(MUX_ADDR);
  Wire.write(1 << channel);
  Wire.endTransmission();
}

String getDateString() {
  time_t now = time(nullptr);
  if (now < 100000) return "";
  struct tm *t = localtime(&now);
  char buf[12];
  snprintf(buf, sizeof(buf), "%04d-%02d-%02d",
           t->tm_year + 1900, t->tm_mon + 1, t->tm_mday);
  return String(buf);
}

// ─────────────────────────────────────────────
//  PARSE
// ─────────────────────────────────────────────

DailyData parseDaily(const String &raw) {
  DailyData data;

  if (raw.length() == 0 || raw.length() > 4096) {
    Serial.println("Parse: empty or oversized payload, skipping");
    return data;
  }

  int start = 0;
  while (start < (int)raw.length()) {
    int end = raw.indexOf('\n', start);
    if (end == -1) end = raw.length();

    String line = raw.substring(start, end);
    line.trim();
    start = end + 1;

    if (line.length() == 0) continue;
    int colon = line.indexOf(':');
    if (colon == -1) continue;

    String key   = line.substring(0, colon);
    String value = line.substring(colon + 1);
    key.trim();
    value.trim();

    if (key.length() == 0 || value.length() == 0) continue;
    if (key.length() > 32 || value.length() > 256) continue;

    if      (key == "blue_top")     data.blueTop    = value;
    else if (key == "blue_bottom")  data.blueBottom  = (value == "gem" || value == "empty") ? value : "empty";
    else if (key == "white_top")    data.whiteTop   = value;
    else if (key == "white_bottom") data.whiteBottom = (value == "gem" || value == "empty") ? value : "empty";
    else if (key == "black_top")    data.blackTop   = value;
    else if (key == "black_bottom") data.blackBottom = (value == "gem" || value == "empty") ? value : "empty";
  }

  if (data.blueTop.length() > 0 && data.whiteTop.length() > 0 && data.blackTop.length() > 0) {
    data.valid = true;
  } else {
    Serial.println("Parse: missing one or more required top fields");
  }

  return data;
}

// ─────────────────────────────────────────────
//  FETCH
// ─────────────────────────────────────────────

void fetchDailyFile() {
  String date = getDateString();
  if (date == "") {
    Serial.println("Fetch: NTP not ready, skipping");
    return;
  }
  if (date == lastFetchedDate) {
    Serial.println("Fetch: already fetched today (" + date + ")");
    return;
  }

  String url = "https://taikuukaits.github.io/parlor-boxes/daily/" + date + ".txt";
  Serial.println("Fetch: " + url);

  WiFiClientSecure client;
  client.setInsecure();
  client.setTimeout(10);

  HTTPClient http;
  if (!http.begin(client, url)) {
    Serial.println("Fetch: http.begin() failed");
    return;
  }

  http.setTimeout(10000);
  http.addHeader("User-Agent", "ESP8266-ParlorBoxes/1.0");

  int code = http.GET();
  Serial.println("Fetch: HTTP " + String(code));

  if (code == 200) {
    String body = http.getString();
    DailyData parsed = parseDaily(body);
    if (parsed.valid) {
      dailyData = parsed;
      lastFetchedDate = date;
      Serial.println("Fetch: OK");
      Serial.println("  blue="  + dailyData.blueTop  + " bottom=" + dailyData.blueBottom);
      Serial.println("  white=" + dailyData.whiteTop + " bottom=" + dailyData.whiteBottom);
      Serial.println("  black=" + dailyData.blackTop + " bottom=" + dailyData.blackBottom);
    } else {
      Serial.println("Fetch: parse failed, keeping old data");
    }
  } else if (code == 404) {
    Serial.println("Fetch: no file for today yet, will retry");
  } else {
    Serial.println("Fetch: unexpected code " + String(code) + ", will retry");
  }

  http.end();
}

// ─────────────────────────────────────────────
//  TIME
// ─────────────────────────────────────────────

void setupTime() {
  configTime(0, 0, "pool.ntp.org", "time.nist.gov");
  Serial.print("Waiting for NTP");
  int attempts = 0;
  while (time(nullptr) < 100000 && attempts < 20) {
    delay(500);
    Serial.print(".");
    attempts++;
  }
  Serial.println(attempts < 20 ? " OK" : " TIMEOUT");
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────

void drawDiamond(Adafruit_SSD1306 &display, bool drawIt) {
  display.clearDisplay();
  if (!drawIt) {
    display.display();
    return;
  }

  int cx = display.width()  / 2;
  int cy = display.height() / 2;
  int rx = 20;
  int ry = 12;

  display.drawLine(cx,      cy + ry, cx + rx, cy,      SSD1306_WHITE);
  display.drawLine(cx + rx, cy,      cx,      cy - ry, SSD1306_WHITE);
  display.drawLine(cx,      cy - ry, cx - rx, cy,      SSD1306_WHITE);
  display.drawLine(cx - rx, cy,      cx,      cy + ry, SSD1306_WHITE);

  display.display();
}
void drawTextWithNewlines(Adafruit_SSD1306 &display, const String &text) {
  const int lineHeight  = 9;   // 8 px glyph + 1 px gap
  const int charsPerRow = 21;  // floor(128 / 6)
  const int startY      = 4;

  int curY = startY;
  int searchFrom = 0;

  while (searchFrom <= (int)text.length()) {
    // Find the next literal \n (two-char sequence backslash + n)
    int nlPos = -1;
    for (int i = searchFrom; i < (int)text.length() - 1; i++) {
      if (text[i] == '\\' && text[i + 1] == 'n') {
        nlPos = i;
        break;
      }
    }

    // Segment is everything from searchFrom up to the \n (or end of string)
    String segment = (nlPos == -1)
      ? text.substring(searchFrom)
      : text.substring(searchFrom, nlPos);
    segment.trim();

    // Word-wrap the segment across as many display rows as needed
    while (segment.length() > 0) {
      String row;
      if ((int)segment.length() <= charsPerRow) {
        row = segment;
        segment = "";
      } else {
        // Try to break at a space within the allowed width
        int breakAt = charsPerRow;
        for (int i = charsPerRow; i > 0; i--) {
          if (segment[i] == ' ') { breakAt = i; break; }
        }
        row     = segment.substring(0, breakAt);
        segment = segment.substring(breakAt);
        segment.trim();
      }

      display.setCursor(0, curY);
      display.print(row);
      curY += lineHeight;

      if (curY >= display.height()) break; // out of vertical space
    }

    if (nlPos == -1) break;            // no more segments
    searchFrom = nlPos + 2;            // skip past the \n token
  }
}

void drawBox(Adafruit_SSD1306 &top, Adafruit_SSD1306 &bottom,
             uint8_t topCh, uint8_t bottomCh,
             const String &text, const String &gemState) {
  selectChannel(topCh);
  top.clearDisplay();
  if (text != "[nothing]") {
    top.setTextSize(1);
    top.setTextColor(SSD1306_WHITE);
    drawTextWithNewlines(top, text);
  }
  top.display();

  selectChannel(bottomCh);
  drawDiamond(bottom, gemState == "gem");
}

void drawPuzzle() {
  if (!dailyData.valid) {
    Serial.println("drawPuzzle: no valid data yet, skipping");
    return;
  }

  drawBox(blueTop,  blueBottom,  BLUE_BOX_TOP_CHANNEL,  BLUE_BOX_BOTTOM_CHANNEL,
          dailyData.blueTop,  dailyData.blueBottom);

  drawBox(whiteTop, whiteBottom, WHITE_BOX_TOP_CHANNEL, WHITE_BOX_BOTTOM_CHANNEL,
          dailyData.whiteTop, dailyData.whiteBottom);

  drawBox(blackTop, blackBottom, BLACK_BOX_TOP_CHANNEL, BLACK_BOX_BOTTOM_CHANNEL,
          dailyData.blackTop, dailyData.blackBottom);
}

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────

void setup() {
  Serial.begin(115200);

  WiFiManager wm;
  if (!wm.autoConnect("ParlorBoxes-Setup")) {
    Serial.println("Failed to connect, restarting...");
    ESP.restart();
  }
  Serial.println("WiFi connected!");

  ArduinoOTA.setHostname("parlor-boxes");
  ArduinoOTA.onStart([]() { Serial.println("OTA Start"); });
  ArduinoOTA.onEnd([]()   { Serial.println("OTA Done");  });
  ArduinoOTA.onError([](ota_error_t e) { ESP.restart(); });
  ArduinoOTA.begin();
  Serial.println("OTA ready");

  Wire.begin(D2, D1);
  Serial.println("Started wire");

  selectChannel(BLUE_BOX_TOP_CHANNEL);
  if (!blueTop.begin(SSD1306_SWITCHCAPVCC, 0x3C))    Serial.println("Blue top display failed");
  selectChannel(BLUE_BOX_BOTTOM_CHANNEL);
  if (!blueBottom.begin(SSD1306_SWITCHCAPVCC, 0x3C))  Serial.println("Blue bottom display failed");

  selectChannel(WHITE_BOX_TOP_CHANNEL);
  if (!whiteTop.begin(SSD1306_SWITCHCAPVCC, 0x3C))    Serial.println("White top display failed");
  selectChannel(WHITE_BOX_BOTTOM_CHANNEL);
  if (!whiteBottom.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("White bottom display failed");

  selectChannel(BLACK_BOX_TOP_CHANNEL);
  if (!blackTop.begin(SSD1306_SWITCHCAPVCC, 0x3C))    Serial.println("Black top display failed");
  selectChannel(BLACK_BOX_BOTTOM_CHANNEL);
  if (!blackBottom.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Black bottom display failed");

  setupTime();
  fetchDailyFile();
}

// ─────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────

void loop() {
  ArduinoOTA.handle();

  if (millis() - lastCheck > 3600000UL || lastCheck == 0) {
    lastCheck = millis();
    String prevDate = lastFetchedDate;
    fetchDailyFile();
    if (lastFetchedDate != prevDate) {
      puzzleDrawn = false;
    }
  }

  if (dailyData.valid && !puzzleDrawn) {
    drawPuzzle();
    puzzleDrawn = true;
  }
}
