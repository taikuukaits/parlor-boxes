#include <ESP8266WiFi.h>
#include <WiFiManager.h>
#include <ArduinoOTA.h>
#include <Wire.h>
#include <Adafruit_GFX.h>
#include <Adafruit_SSD1306.h>
#include <time.h>
#include <ESP8266HTTPClient.h>
#include <WiFiClientSecure.h>

// ─────────────────────────────────────────────
//  CONFIGURATION — edit everything here
// ─────────────────────────────────────────────

#define MUX_ADDR 0x70

// One entry per box.  Add or remove entries to change how many boxes exist.
// top_channel    → the 128×64 text display for this box
// bottom_channel → the 128×32 gem/diamond display below it
struct BoxConfig {
  uint8_t top_channel;
  uint8_t bottom_channel;
};

static const BoxConfig BOX_CONFIG[] = {
  { 1, 5 },   // Box 1: top on mux ch 1, bottom on mux ch 5
  { 2, 6 },   // Box 2: top on mux ch 2, bottom on mux ch 6
  { 3, 7 },   // Box 3: top on mux ch 3, bottom on mux ch 7
};
static const int NUM_BOXES = 3;

// ─────────────────────────────────────────────
//  DISPLAY OBJECTS  (indexed 0…NUM_BOXES-1)
// ─────────────────────────────────────────────

Adafruit_SSD1306 topDisplay[3]    = {
  Adafruit_SSD1306(128, 64, &Wire, -1),
  Adafruit_SSD1306(128, 64, &Wire, -1),
  Adafruit_SSD1306(128, 64, &Wire, -1),
};
Adafruit_SSD1306 bottomDisplay[3] = {
  Adafruit_SSD1306(128, 32, &Wire, -1),
  Adafruit_SSD1306(128, 32, &Wire, -1),
  Adafruit_SSD1306(128, 32, &Wire, -1),
};

// ─────────────────────────────────────────────
//  DAILY DATA
// ─────────────────────────────────────────────

struct DailyData {
  String top[3];
  String bottom[3];   // "gem" or "empty"
  bool valid = false;
};

DailyData dailyData;
String lastFetchedDate = "";
bool puzzleDrawn = false;
unsigned long lastCheck = 0;

// ─────────────────────────────────────────────
//  HELPERS
// ─────────────────────────────────────────────

void selectChannel(uint8_t channel) {
  Wire.beginTransmission(MUX_ADDR);
  Wire.write(1 << channel);
  Wire.endTransmission();
}

String getDateString() {
  time_t now = time(nullptr);
  if (now < 100000) return "";
  struct tm *t = localtime(&now);
  char buf[12];
  snprintf(buf, sizeof(buf), "%04d-%02d-%02d",
           t->tm_year + 1900, t->tm_mon + 1, t->tm_mday);
  return String(buf);
}

// ─────────────────────────────────────────────
//  PARSE
// ─────────────────────────────────────────────

DailyData parseDaily(const String &raw) {
  DailyData data;

  if (raw.length() == 0 || raw.length() > 4096) {
    Serial.println("Parse: empty or oversized payload, skipping");
    return data;
  }

  int start = 0;
  while (start < (int)raw.length()) {
    int end = raw.indexOf('\n', start);
    if (end == -1) end = raw.length();

    String line = raw.substring(start, end);
    line.trim();
    start = end + 1;

    if (line.length() == 0) continue;
    int colon = line.indexOf(':');
    if (colon == -1) continue;

    String key   = line.substring(0, colon);
    String value = line.substring(colon + 1);
    key.trim();
    value.trim();

    if (key.length() == 0 || value.length() == 0) continue;
    if (key.length() > 32 || value.length() > 256) continue;

    for (int i = 0; i < NUM_BOXES; i++) {
      String idx = String(i + 1);
      if (key == "box" + idx + "_top") {
        data.top[i] = value;
      } else if (key == "box" + idx + "_bottom") {
        data.bottom[i] = (value == "gem" || value == "empty") ? value : "empty";
      }
    }
  }

  // Require all top fields to be present
  data.valid = true;
  for (int i = 0; i < NUM_BOXES; i++) {
    if (data.top[i].length() == 0) {
      Serial.println("Parse: missing top for box " + String(i + 1));
      data.valid = false;
    }
  }

  return data;
}

// ─────────────────────────────────────────────
//  FETCH
// ─────────────────────────────────────────────

void fetchDailyFile() {
  String date = getDateString();
  if (date == "") {
    Serial.println("Fetch: NTP not ready, skipping");
    return;
  }
  if (date == lastFetchedDate) {
    Serial.println("Fetch: already fetched today (" + date + ")");
    return;
  }

  String url = "https://taikuukaits.github.io/parlor-boxes/daily/" + date + ".txt";
  Serial.println("Fetch: " + url);

  WiFiClientSecure client;
  client.setInsecure();
  client.setTimeout(10);

  HTTPClient http;
  if (!http.begin(client, url)) {
    Serial.println("Fetch: http.begin() failed");
    return;
  }

  http.setTimeout(10000);
  http.addHeader("User-Agent", "ESP8266-ParlorBoxes/1.0");

  int code = http.GET();
  Serial.println("Fetch: HTTP " + String(code));

  if (code == 200) {
    String body = http.getString();
    DailyData parsed = parseDaily(body);
    if (parsed.valid) {
      dailyData = parsed;
      lastFetchedDate = date;
      Serial.println("Fetch: OK");
      for (int i = 0; i < NUM_BOXES; i++) {
        Serial.println("  box" + String(i+1) + "=" + dailyData.top[i]
                       + " bottom=" + dailyData.bottom[i]);
      }
    } else {
      Serial.println("Fetch: parse failed, keeping old data");
    }
  } else if (code == 404) {
    Serial.println("Fetch: no file for today yet, will retry");
  } else {
    Serial.println("Fetch: unexpected code " + String(code) + ", will retry");
  }

  http.end();
}

// ─────────────────────────────────────────────
//  TIME
// ─────────────────────────────────────────────

void setupTime() {
  configTime(0, 0, "pool.ntp.org", "time.nist.gov");
  Serial.print("Waiting for NTP");
  int attempts = 0;
  while (time(nullptr) < 100000 && attempts < 20) {
    delay(500);
    Serial.print(".");
    attempts++;
  }
  Serial.println(attempts < 20 ? " OK" : " TIMEOUT");
}

// ─────────────────────────────────────────────
//  DRAWING
// ─────────────────────────────────────────────

void drawDiamond(Adafruit_SSD1306 &display, bool drawIt) {
  display.clearDisplay();
  if (!drawIt) {
    display.display();
    return;
  }

  int cx = display.width()  / 2;   // 64
  int cy = display.height() / 2;   // 16
  int rx = 20;
  int ry = 12;

  int top    = cy + ry;
  int bottom = cy - ry;
  int left   = cx - rx;
  int right  = cx + rx;

  display.drawLine(cx,    top,    right, cy,     SSD1306_WHITE);
  display.drawLine(right, cy,     cx,    bottom, SSD1306_WHITE);
  display.drawLine(cx,    bottom, left,  cy,     SSD1306_WHITE);
  display.drawLine(left,  cy,     cx,    top,    SSD1306_WHITE);

  display.display();
}

void drawPuzzle() {
  if (!dailyData.valid) {
    Serial.println("drawPuzzle: no valid data yet, skipping");
    return;
  }

  for (int i = 0; i < NUM_BOXES; i++) {
    // Top (text) display
    selectChannel(BOX_CONFIG[i].top_channel);
    topDisplay[i].clearDisplay();
    topDisplay[i].setTextSize(1);
    topDisplay[i].setTextColor(SSD1306_WHITE);
    topDisplay[i].setCursor(0, 10);
    topDisplay[i].print(dailyData.top[i]);
    topDisplay[i].display();

    // Bottom (gem) display
    selectChannel(BOX_CONFIG[i].bottom_channel);
    drawDiamond(bottomDisplay[i], dailyData.bottom[i] == "gem");
  }
}

// ─────────────────────────────────────────────
//  SETUP
// ─────────────────────────────────────────────

void setup() {
  Serial.begin(115200);

  WiFiManager wm;
  if (!wm.autoConnect("ParlorBoxes-Setup")) {
    Serial.println("Failed to connect, restarting...");
    ESP.restart();
  }
  Serial.println("WiFi connected!");

  ArduinoOTA.setHostname("parlor-boxes");
  ArduinoOTA.onStart([]() { Serial.println("OTA Start"); });
  ArduinoOTA.onEnd([]()   { Serial.println("OTA Done");  });
  ArduinoOTA.onError([](ota_error_t e) { ESP.restart(); });
  ArduinoOTA.begin();
  Serial.println("OTA ready");

  Wire.begin(D2, D1);
  Serial.println("Started wire");

  for (int i = 0; i < NUM_BOXES; i++) {
    selectChannel(BOX_CONFIG[i].top_channel);
    if (!topDisplay[i].begin(SSD1306_SWITCHCAPVCC, 0x3C))
      Serial.println("Top display " + String(i+1) + " failed");

    selectChannel(BOX_CONFIG[i].bottom_channel);
    if (!bottomDisplay[i].begin(SSD1306_SWITCHCAPVCC, 0x3C))
      Serial.println("Bottom display " + String(i+1) + " failed");
  }

  setupTime();
  fetchDailyFile();
}

// ─────────────────────────────────────────────
//  LOOP
// ─────────────────────────────────────────────

void loop() {
  ArduinoOTA.handle();

  if (millis() - lastCheck > 3600000UL || lastCheck == 0) {
    lastCheck = millis();
    String prevDate = lastFetchedDate;
    fetchDailyFile();
    if (lastFetchedDate != prevDate) {
      puzzleDrawn = false;
    }
  }

  if (dailyData.valid && !puzzleDrawn) {
    drawPuzzle();
    puzzleDrawn = true;
  }
}
