#include <ESP8266WiFi.h>
#include <WiFiManager.h>
#include <ArduinoOTA.h>
#include <Wire.h>
#include <Adafruit_GFX.h>
#include <Adafruit_SSD1306.h>

#define MUX_ADDR 0x70

Adafruit_SSD1306 display1(128, 64, &Wire, -1);
Adafruit_SSD1306 display2(128, 64, &Wire, -1);
Adafruit_SSD1306 display3(128, 64, &Wire, -1);

Adafruit_SSD1306 display4(128, 32, &Wire, -1);
Adafruit_SSD1306 display5(128, 32, &Wire, -1);
Adafruit_SSD1306 display6(128, 32, &Wire, -1);

void selectChannel(uint8_t channel) {
  Wire.beginTransmission(MUX_ADDR);
  Wire.write(1 << channel);
  Wire.endTransmission();
}


void setup() {
  Serial.begin(115200);

  WiFiManager wm;

  if (!wm.autoConnect("ParlorBoxes-Setup")) {
    Serial.println("Failed to connect, restarting...");
    ESP.restart();
  }
  Serial.println("WiFi connected!");

  ArduinoOTA.setHostname("parlor-boxes");

  ArduinoOTA.onStart([]() { Serial.println("OTA Start"); });
  ArduinoOTA.onEnd([]()   { Serial.println("OTA Done");  });
  ArduinoOTA.onError([](ota_error_t e) { ESP.restart(); });

  ArduinoOTA.begin();
  Serial.println("OTA ready");

  Wire.begin(D2, D1);
  Serial.println("Started wire");

  selectChannel(1);
  if (!display1.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 1 failed");

  selectChannel(2);
  if (!display2.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 2 failed");

  selectChannel(3);
  if (!display3.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 3 failed");

  selectChannel(5);
  if (!display4.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 4 failed");

  selectChannel(6);
  if (!display5.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 5 failed");

  selectChannel(7);
  if (!display6.begin(SSD1306_SWITCHCAPVCC, 0x3C)) Serial.println("Display 6 failed");

  selectChannel(1);
  Serial.println("Selected channel");
  display1.clearDisplay();
  Serial.println("Clear display");
  display1.setTextSize(1);
  display1.setTextColor(SSD1306_WHITE);
  display1.setCursor(0, 10);
  display1.print("Display 1");
  display1.display();
  Serial.println("Display 1 done");

  selectChannel(2);
  display2.clearDisplay();
  display2.setTextSize(1);
  display2.setTextColor(SSD1306_WHITE);
  display2.setCursor(0, 10);
  display2.print("Display 2");
  display2.display();

  selectChannel(3);
  display3.clearDisplay();
  display3.setTextSize(1);
  display3.setTextColor(SSD1306_WHITE);
  display3.setCursor(0, 10);
  display3.print("Display 3");
  display3.display();

  selectChannel(5);
  display4.clearDisplay();
  display4.setTextSize(1);
  display4.setTextColor(SSD1306_WHITE);
  display4.setCursor(0, 10);
  display4.print("Display 4");
  display4.display();
  
  selectChannel(6);
  display5.clearDisplay();
  display5.setTextSize(1);
  display5.setTextColor(SSD1306_WHITE);
  display5.setCursor(0, 10);
  display5.print("Display 5");
  display5.display();
  
  selectChannel(7);
  display6.clearDisplay();
  display6.setTextSize(1);
  display6.setTextColor(SSD1306_WHITE);
  display6.setCursor(0, 10);
  drawDiamond(display6, true);
  display6.display();
}

void loop() {
  ArduinoOTA.handle();
}

void drawDiamond(Adafruit_SSD1306 &display, bool flipped) {
  display.clearDisplay();
  
  int w = display.width();   // 128
  int h = display.height();  // 32
  
  int cx = w / 2;            // center x (64)
  int cy = h / 2;            // center y (16)
  int rx = 20;               // horizontal radius
  int ry = 12;               // vertical radius

  // Diamond is just 4 lines connecting top/bottom/left/right points
  int top    = flipped ? cy + ry : cy - ry;
  int bottom = flipped ? cy - ry : cy + ry;
  int left   = cx - rx;
  int right  = cx + rx;

  display.drawLine(cx, top,    right, cy,     SSD1306_WHITE); // top to right
  display.drawLine(right, cy,  cx,    bottom, SSD1306_WHITE); // right to bottom
  display.drawLine(cx, bottom, left,  cy,     SSD1306_WHITE); // bottom to left
  display.drawLine(left, cy,   cx,    top,    SSD1306_WHITE); // left to top

  display.display();
}
